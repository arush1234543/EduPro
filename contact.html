<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="head">
        <div class="lefthead">
            <img src="images/Logo.png" alt="EduPro Logo" class="logo">
        </div>
        <div class="righthead">
            <button class="Get-Started" id="GetStarted">Get Started Today</button>
        </div>
    </header>
    <main class="contact-container">
    <div class="contact-header">
        <h1 class="hero-title">Get in <span>Touch</span></h1>
        <p class="hero-subtext">We're here to help. Reach out via the details below or drop us a message.</p>
    </div>

    <div class="contact-grid">
        <div class="contact-info">
            <div class="info-item">
                <h3>Email Us</h3>
                <p>abc@gmail.com</p>
            </div>
            <div class="info-item">
                <h3>Call Us</h3>
                <p>+91 99XXXXXXXX99</p>
            </div>
            <div class="info-item">
                <h3>Location</h3>
                <p>Varanasi, Uttar Pradesh, India</p>
            </div>
        </div>

        <form class="contact-form">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit" class="Get-Started">Send Message</button>
        </form>
    </div>
</main>
    <footer>
        <nav class="options">
            <ul>
                <li>
                    <div class="footerdiv">About Us</div>
                </li>
                <li>
                    <div class="footerdiv">Explore</div>
                </li>
                <li>
                    <div class="footerdiv">Contact us</div>
                </li>
                <li>
                    <div class="footerdiv">Earn with us</div>
                </li>
            </ul>
        </nav>
        <div class="Copyright">&copy; 2026 EduPro Academy. All Rights Reserved.</div>
    </footer>
</body>

</html>
